<header class="topbar">
  <div class="topbar__brand">DF/</div>
  <nav class="topbar__tabs">
    <a {% if active == 'accounts' %}class="active"{% endif %} href="/">Accounts</a>
    <a {% if active == 'chat' %}class="active"{% endif %} href="/chat">Chat</a>
    <a {% if active == 'voice' %}class="active"{% endif %} href="/voice">Voice</a>
    <a {% if active == 'stage' %}class="active"{% endif %} href="/stage">Stage</a>
    <a {% if active == 'utils' %}class="active"{% endif %} href="/utils">Utils</a>
    {% if user == 'admin' %}
    <a {% if active == 'admin' %}class="active"{% endif %} href="/admin" style="color:var(--accent);">Admin</a>
    {% endif %}
  </nav>
  <div class="topbar__user">
    <span>{{ user }}</span>
    <form method="post" action="/logout"><button type="submit" class="link">Sign out</button></form>
  </div>
</header>
