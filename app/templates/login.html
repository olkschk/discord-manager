{% extends "base.html" %}
{% block title %}Sign in · Discord Farm{% endblock %}
{% block body %}
<main class="auth">
  <aside class="auth__brand">
    <div>
      <h1 class="auth__mark">
        <span>DISCORD</span>
        <span>FARM/</span>
      </h1>
      <p class="auth__tagline">
        Account orchestration — text, voice, identity. Internal control surface.
      </p>
    </div>
    <div class="auth__meta">
      <span>v0.1 · LOCAL</span>
      <span>RESTRICTED ACCESS</span>
    </div>
  </aside>

  <section class="auth__form">
    <h2>Sign in</h2>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <form method="post" action="/login" autocomplete="on">
      <label>
        <span>Login</span>
        <input type="text" name="login" autocomplete="username" required autofocus />
      </label>
      <label>
        <span>Password</span>
        <input type="password" name="password" autocomplete="current-password" required />
      </label>
      <div style="display:flex; gap: var(--sp-sm); margin-top: var(--sp-md);">
        <button type="submit" class="primary">Authenticate</button>
      </div>
    </form>
  </section>
</main>
{% endblock %}
