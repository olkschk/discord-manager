{% extends "base.html" %}
{% block title %}Chat · Discord Farm{% endblock %}
{% block body %}
<div class="shell">
  {% include "_topbar.html" %}

  <main class="page chat-page">
    <aside class="chat__side">
      <div class="section__head">
        <span class="section__title">Topic</span>
      </div>
      <form id="topicForm" class="panel">
        <label>
          <span>Channel ID</span>
          <input type="text" id="topicInput" placeholder="123456789012345678" spellcheck="false" />
        </label>
        <button type="submit" class="primary">Open</button>
      </form>

      <div class="section__head" style="margin-top: var(--sp-xl);">
        <span class="section__title">Templates</span>
        <button type="button" class="small" id="newTemplateBtn">New</button>
      </div>
      <div class="panel" id="templatesPanel">
        <output id="templatesList" class="templates-list">Loading…</output>
        <form id="newTemplateForm" hidden>
          <textarea id="newTemplateText" rows="3" placeholder="Template text…" required></textarea>
          <div style="display:flex; gap: var(--sp-sm); justify-content: flex-end;">
            <button type="button" class="small" id="cancelTemplateBtn">Cancel</button>
            <button type="submit" class="small primary">Save</button>
          </div>
        </form>
      </div>
    </aside>

    <section class="chat__main">
      <div class="section__head">
        <span class="section__title">
          Messages · <span id="topicLabel" class="muted-inline">no topic loaded</span>
        </span>
        <span class="section__sub" id="messageCount">—</span>
      </div>

      <div class="messages" id="messages">
        <p class="messages__empty">Open a topic to load the last 100 messages.</p>
      </div>

      <form id="sendForm" class="send">
        <div class="send__row">
          <select id="accountSelect" required>
            <option value="">Select account…</option>
            {% for a in accounts %}
              <option value="{{ a.id }}">{{ a.username }} ({{ a.email }})</option>
            {% endfor %}
          </select>
          <span id="replyChip" class="reply-chip" hidden>
            replying to <code id="replyId"></code>
            <button type="button" id="cancelReply">×</button>
          </span>
        </div>
        <textarea id="sendText" rows="2" placeholder="Write a message…" maxlength="2000" required></textarea>
        <div class="send__row send__actions">
          <label class="dup-toggle">
            <input type="checkbox" id="duplicateToggle" />
            <span>Duplicate to multiple channels</span>
          </label>
          <output id="sendResult" class="result"></output>
          <button type="submit" class="primary">Send</button>
        </div>
        <textarea
          id="duplicateChannels"
          rows="2"
          placeholder="One channel ID per line"
          hidden
        ></textarea>
      </form>
    </section>
  </main>
</div>

<script>
const accountSelect = document.getElementById("accountSelect");
const topicInput = document.getElementById("topicInput");
const topicLabel = document.getElementById("topicLabel");
const messageCount = document.getElementById("messageCount");
const messagesEl = document.getElementById("messages");
const sendForm = document.getElementById("sendForm");
const sendText = document.getElementById("sendText");
const sendResult = document.getElementById("sendResult");
const duplicateToggle = document.getElementById("duplicateToggle");
const duplicateChannels = document.getElementById("duplicateChannels");
const replyChip = document.getElementById("replyChip");
const replyIdEl = document.getElementById("replyId");
const cancelReplyBtn = document.getElementById("cancelReply");

let currentTopic = null;
let replyTo = null;

function setReply(id) {
  replyTo = id;
  if (id) {
    replyIdEl.textContent = id;
    replyChip.hidden = false;
  } else {
    replyChip.hidden = true;
  }
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

function renderMessages(items) {
  if (!items.length) {
    messagesEl.innerHTML = '<p class="messages__empty">No stored messages for this topic yet.</p>';
    return;
  }
  messagesEl.innerHTML = items.map(m => {
    const time = m.timestamp ? new Date(m.timestamp).toLocaleString() : "";
    const img = m.image ? `<img class="msg__img" src="${escapeHtml(m.image)}" alt="" />` : "";
    return `
      <article class="msg" data-id="${escapeHtml(m.id)}">
        <header class="msg__head">
          <span class="msg__from">${escapeHtml(m.from || "?")}</span>
          <span class="msg__time">${escapeHtml(time)}</span>
          <button type="button" class="small msg__reply" data-id="${escapeHtml(m.id)}">Reply</button>
        </header>
        <p class="msg__text">${escapeHtml(m.text || "")}</p>
        ${img}
      </article>
    `;
  }).join("");

  messagesEl.querySelectorAll(".msg__reply").forEach(btn => {
    btn.addEventListener("click", () => setReply(btn.dataset.id));
  });
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

document.getElementById("topicForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const tid = topicInput.value.trim();
  if (!tid) return;
  currentTopic = tid;
  topicLabel.textContent = tid;
  const r = await fetch(`/api/chat/topic/${tid}/messages`);
  const data = await r.json();
  renderMessages(data);
  messageCount.textContent = `${data.length} stored`;
});

duplicateToggle.addEventListener("change", () => {
  duplicateChannels.hidden = !duplicateToggle.checked;
});

cancelReplyBtn.addEventListener("click", () => setReply(null));

sendForm.addEventListener("submit", async (e) => {
  e.preventDefault();
  const accountId = accountSelect.value;
  const text = sendText.value.trim();
  if (!accountId || !text) return;

  sendResult.classList.remove("ok", "err");
  sendResult.textContent = "Sending…";

  let resp, body;
  if (duplicateToggle.checked) {
    const channels = duplicateChannels.value.split("\n").map(s => s.trim()).filter(Boolean);
    if (!channels.length) {
      sendResult.textContent = "Add at least one channel id";
      sendResult.classList.add("err");
      return;
    }
    body = { account_id: accountId, channel_ids: channels, content: text };
    resp = await fetch("/api/chat/duplicate", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(body),
    });
  } else {
    if (!currentTopic) {
      sendResult.textContent = "Open a topic first";
      sendResult.classList.add("err");
      return;
    }
    body = { account_id: accountId, channel_id: currentTopic, content: text, reply_to: replyTo };
    resp = await fetch("/api/chat/send", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(body),
    });
  }
  const data = await resp.json();
  if (resp.ok && (data.sent || (data.results || []).every(r => r.ok))) {
    sendResult.classList.add("ok");
    sendResult.textContent = duplicateToggle.checked ? `Sent to ${data.results.length}` : "Sent";
    sendText.value = "";
    setReply(null);
  } else {
    sendResult.classList.add("err");
    sendResult.textContent = "Failed — check console";
    console.warn("send failed", data);
  }
});

// Templates
const templatesList = document.getElementById("templatesList");
const newTemplateBtn = document.getElementById("newTemplateBtn");
const newTemplateForm = document.getElementById("newTemplateForm");
const cancelTemplateBtn = document.getElementById("cancelTemplateBtn");
const newTemplateText = document.getElementById("newTemplateText");

async function loadTemplates() {
  const r = await fetch("/api/templates");
  const data = await r.json();
  if (!data.length) {
    templatesList.innerHTML = '<span class="muted">No templates yet</span>';
    return;
  }
  templatesList.innerHTML = data.map(t => `
    <div class="tmpl" data-id="${t.id}">
      <button type="button" class="tmpl__use" data-text="${escapeHtml(t.text)}">${escapeHtml(t.text.slice(0, 80))}${t.text.length > 80 ? "…" : ""}</button>
      <button type="button" class="tmpl__del small danger" data-id="${t.id}">×</button>
    </div>
  `).join("");
  templatesList.querySelectorAll(".tmpl__use").forEach(b => {
    b.addEventListener("click", () => { sendText.value = b.dataset.text; sendText.focus(); });
  });
  templatesList.querySelectorAll(".tmpl__del").forEach(b => {
    b.addEventListener("click", async () => {
      if (!confirm("Delete template?")) return;
      await fetch(`/api/templates/${b.dataset.id}`, { method: "DELETE" });
      loadTemplates();
    });
  });
}

newTemplateBtn.addEventListener("click", () => {
  newTemplateForm.hidden = false;
  newTemplateText.focus();
});
cancelTemplateBtn.addEventListener("click", () => {
  newTemplateForm.hidden = true;
  newTemplateText.value = "";
});
newTemplateForm.addEventListener("submit", async (e) => {
  e.preventDefault();
  const text = newTemplateText.value.trim();
  if (!text) return;
  await fetch("/api/templates", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ text }),
  });
  newTemplateText.value = "";
  newTemplateForm.hidden = true;
  loadTemplates();
});

loadTemplates();
</script>
{% endblock %}
